services:
  app:
    image: oven/bun:1-alpine
    user: "${MY_UID}:${MY_GID}"
    ports:
      - "3000:3000"
    networks:
      - barcode_generator_network
    restart: unless-stopped
    working_dir: /src
    volumes:
      - .:/src
    command: bun run start
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  barcode_generator_network:
    external: true
